name: Sync Google Scholar Publications

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 6:00 AM UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to commit publications.json back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scholarly
        run: pip install scholarly

      - name: Fetch publications from Google Scholar
        env:
          SCHOLAR_ID: ${{ secrets.SCHOLAR_ID }}
        run: python fetch_publications.py

      - name: Commit and push publications.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add publications.json
          git diff --staged --quiet || git commit -m "chore: auto-sync publications from Google Scholar"
          git push
